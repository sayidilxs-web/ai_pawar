<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://generativelanguage.googleapis.com;">
    <title>NEXUS AI - আপনার ব্যক্তিগত সহকারী</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Animated Background -->
        <div class="bg-container">
            <div class="circuit-bg"></div>
            <div class="circuit-lines"></div>
            <div class="animated-grid"></div>
            <div class="particles-container">
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
            </div>
        </div>
        
        <!-- Central Energy Vortex Core -->
        <div class="core-container">
            <div class="vortex-core">
                <div class="core-glow"></div>
                <div class="orbital-ring ring-1"></div>
                <div class="orbital-ring ring-2"></div>
                <div class="orbital-ring ring-3"></div>
                <div class="energy-sphere"></div>
                <div class="inner-core"></div>
                <div class="energy-particle" style="top: 50%; left: 50%;"></div>
                <div class="energy-particle" style="top: 50%; left: 50%;"></div>
                <div class="energy-particle" style="top: 50%; left: 50%;"></div>
                <div class="core-clickable" id="coreClickable" onclick="toggleListening()"></div>
            </div>
        </div>
        
        <!-- Scanlines Effect -->
        <div class="scanlines"></div>
        
        <!-- Main Container -->
        <div class="main-container">
            <!-- Top Navigation -->
            <header class="top-nav">
                <div class="logo">
                    <div class="logo-icon">◈</div>
                    <span class="logo-text">NEXUS</span>
                    <span class="logo-ai">AI</span>
                </div>
                <div class="status-badge" id="statusBadge">
                    <div class="status-led"></div>
                    <span class="status-text" id="statusText">পিসি রেডি</span>
                </div>
                <div class="window-controls">
                    <button class="win-btn minimize" onclick="window.nexusAI?.minimizeWindow()">─</button>
                    <button class="win-btn maximize" onclick="window.nexusAI?.maximizeWindow()">□</button>
                    <button class="win-btn close" onclick="window.nexusAI?.closeWindow()">✕</button>
                </div>
            </header>

            <!-- Content Area -->
            <div class="content-area">
                <!-- Left Panel - Action Log -->
                <div class="glass-panel left-panel">
                    <div class="panel-header">
                        <span class="panel-icon">⚡</span>
                        <span class="panel-title">অ্যাকশন লগ</span>
                    </div>
                    <div class="panel-content" id="actionLog">
                        <div class="log-entry system">
                            <div class="log-time">--:--:--</div>
                            <div class="log-text">সিস্টেম চালু হয়েছে...</div>
                        </div>
                    </div>
                    <div class="system-stats">
                        <div class="stat-row">
                            <span class="stat-label">CPU</span>
                            <div class="stat-bar-container">
                                <div class="stat-bar cpu" id="cpuBar" style="width: 25%"></div>
                            </div>
                            <span class="stat-value" id="cpuValue">25%</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">মেমোরি</span>
                            <div class="stat-bar-container">
                                <div class="stat-bar memory" id="memBar" style="width: 40%"></div>
                            </div>
                            <span class="stat-value" id="memValue">40%</span>
                        </div>
                    </div>
                </div>

                <!-- Center Section (Empty space for Core) -->
                <div class="center-section">
                    <!-- Wake Indicator -->
                    <div class="wake-indicator" id="wakeIndicator">
                        <span>শুনছি...</span>
                    </div>
                </div>

                <!-- Right Panel - Discussion / Chat -->
                <div class="glass-panel right-panel">
                    <div class="panel-header">
                        <span class="panel-icon">💬</span>
                        <span class="panel-title">চ্যাট</span>
                        <div class="language-selector">
                            <select id="chatLanguageSelect" onchange="changeChatLanguage(this.value)">
                                <option value="bn-BD">🇧🇩 বাংলা</option>
                                <option value="en-US">🇺🇸 English</option>
                                <option value="hi-IN">🇮🇳 हिन्दी</option>
                                <option value="ar-SA">🇸🇦 العربية</option>
                                <option value="zh-CN">🇨🇳 中文</option>
                                <option value="es-ES">🇪🇸 Español</option>
                                <option value="fr-FR">🇫🇷 Français</option>
                                <option value="de-DE">🇩🇪 Deutsch</option>
                                <option value="ja-JP">🇯🇵 日本語</option>
                                <option value="ko-KR">🇰🇷 한국어</option>
                                <option value="ru-RU">🇷🇺 Русский</option>
                                <option value="pt-BR">🇧🇷 Português</option>
                                <option value="it-IT">🇮🇹 Italiano</option>
                                <option value="tr-TR">🇹🇷 Türkçe</option>
                            </select>
                        </div>
                    </div>
                    <div class="chat-area" id="chatArea">
                        <div class="chat-message ai">
                            <div class="message-sender">🤖 NEXUS AI</div>
                            <div class="message-text">হ্যালো! আমি নেক্সাস। যেকোনো ভাষায় কথা বলো! 🌍</div>
                        </div>
                    </div>
                    
                    <!-- Chat Input Area -->
                    <div class="chat-input-area">
                        <div class="input-tools">
                            <button class="tool-btn" onclick="generateImage()" title="🖼️ Image">🖼️</button>
                            <button class="tool-btn" onclick="generatePDF()" title="📄 PDF">📄</button>
                            <button class="tool-btn" onclick="generateCode()" title="💻 Code">💻</button>
                            <button class="tool-btn" onclick="translateText()" title="🌐 Translate">🌐</button>
                        </div>
                        <div class="input-wrapper">
                            <input type="text" id="chatInput" placeholder="মেসেজ লিখুন..." onkeypress="handleChatKeyPress(event)">
                            <button class="send-btn" onclick="sendChatMessage()">➤</button>
                        </div>
                    </div>
                    
                    <div class="telemetry-bar">
                        <div class="telemetry-item">
                            <span class="telemetry-label">নেটওয়ার্ক</span>
                            <div class="telemetry-graph">
                                <div class="telemetry-spark"></div>
                            </div>
                        </div>
                        <div class="telemetry-item">
                            <span class="telemetry-label">মেমোরি</span>
                            <div class="telemetry-graph">
                                <div class="telemetry-spark"></div>
                            </div>
                        </div>
                        <div class="telemetry-item">
                            <span class="telemetry-label">AI: জেমিনি</span>
                            <div class="telemetry-graph">
                                <div class="telemetry-spark"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom Control Section -->
            <div class="bottom-section">
                <!-- Audio Visualizer -->
                <div class="audio-section">
                    <span class="audio-label">অডিও ইনপুট</span>
                    <div class="audio-visualizer" id="audioVisualizer">
                        <div class="audio-bar"></div>
                        <div class="audio-bar"></div>
                        <div class="audio-bar"></div>
                        <div class="audio-bar"></div>
                        <div class="audio-bar"></div>
                        <div class="audio-bar"></div>
                        <div class="audio-bar"></div>
                        <div class="audio-bar"></div>
                        <div class="audio-bar"></div>
                        <div class="audio-bar"></div>
                        <div class="audio-bar"></div>
                        <div class="audio-bar"></div>
                    </div>
                    <div class="volume-control">
                        <span class="volume-icon">🔊</span>
                        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
                        <span class="volume-value" id="volumeValue">80%</span>
                    </div>
                </div>

                <!-- Control Buttons -->
                <div class="control-buttons">
                    <button class="ctrl-btn" id="listenBtn" onclick="toggleListening()">
                        <span class="btn-icon">🎤</span>
                        <span class="btn-text">শুনুন</span>
                    </button>
                    <button class="ctrl-btn" id="screenBtn" onclick="captureScreen()">
                        <span class="btn-icon">📸</span>
                        <span class="btn-text">স্ক্রিন</span>
                    </button>
                    <button class="ctrl-btn" id="settingsBtn" onclick="openSettings()">
                        <span class="btn-icon">⚙️</span>
                        <span class="btn-text">সেটিংস</span>
                    </button>
                </div>

                <!-- Status Bar -->
                <div class="status-bar">
                    <div class="status-item">
                        <span class="label">CPU:</span>
                        <span class="value" id="cpuStatusSmall">--</span>
                    </div>
                    <div class="status-item">
                        <span class="label">মেমোরি:</span>
                        <span class="value" id="memStatusSmall">--</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div class="modal-overlay" id="settingsModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>সেটিংস</h2>
                    <button class="modal-close" onclick="closeSettings()">✕</button>
                </div>
                <div class="modal-body">
                    <div class="setting-group">
                        <label>জেমিনি API কী</label>
                        <input type="password" id="geminiApiKey" placeholder="AIza...">
                    </div>
                    <div class="setting-group">
                        <label>ওয়েক ওয়ার্ড</label>
                        <input type="text" id="wakeWord" value="হ্যালো নেক্সাস">
                    </div>
                    <div class="setting-group">
                        <label>ভাষা</label>
                        <select id="languageSelect">
                            <option value="bn-BD" selected>বাংলা</option>
                            <option value="en-US">English</option>
                        </select>
                    </div>
                    <div class="setting-group">
                        <label>
                            <input type="checkbox" id="faceRecogToggle" checked>
                            চেহারা চিনতে পারা
                        </label>
                    </div>
                    <div class="setting-group">
                        <label>
                            <input type="checkbox" id="screenCaptureToggle" checked>
                            স্ক্রিন দেখতে পারা
                        </label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-save" onclick="saveSettings()">সেভ করুন</button>
                </div>
            </div>
        </div>

        <!-- Notification -->
        <div class="notification" id="notification">
            <span id="notificationText"></span>
        </div>
    </div>

    <!-- Scripts - Core -->
    <script src="config.js"></script>
    <script src="ai-core.js"></script>
    <script src="voice-recognition.js"></script>
    <script src="voice-synthesis.js"></script>
    <script src="automation.js"></script>
    <script src="screen-capture.js"></script>
    
    <!-- Scripts - Error & Offline (NEW) -->
    <script src="error-handler.js"></script>
    <script src="offline-mode.js"></script>
    
    <!-- Scripts - Components -->
    <script src="components/orb.js"></script>
    <script src="components/audio-visualizer.js"></script>
    
    <!-- Scripts - Additional Features -->
    <script src="database-manager.js"></script>
    <script src="face-recognition.js"></script>
    <script src="keyboard-shortcuts.js"></script>
    <script src="command-parser.js"></script>
    <script src="commands.js"></script>
    <script src="notification-system.js"></script>
    
    <!-- Scripts - Phone & Device Connections -->
    <script src="phone-connection.js"></script>
    <script src="notification-bridge.js"></script>
    <script src="task-scheduler.js"></script>
    <script src="integrations.js"></script>
    
    <!-- Scripts - Utility Modules -->
    <script src="utils/logger.js"></script>
    <script src="utils/notifications.js"></script>
    <script src="utils/history.js"></script>
    <script src="utils/api.js"></script>
    <script src="utils/cache.js"></script>
    <script src="utils/helpers.js"></script>
    <script src="utils/performance.js"></script>
    <script src="utils/security.js"></script>
    <script src="utils/state.js"></script>
    <script src="utils/storage.js"></script>
    <script src="utils/constants.js"></script>
    <script src="utils/context.js"></script>
    <script src="utils/locale.js"></script>
    <script src="utils/theme.js"></script>
    <script src="utils/debug.js"></script>
    <script src="utils/events.js"></script>
    <script src="utils/session.js"></script>
    <script src="utils/version.js"></script>
    <script src="utils/tts-manager.js"></script>
    <script src="utils/speech-manager.js"></script>
    <script src="utils/prompts.js"></script>
    <script src="utils/validator.js"></script>
    <script src="utils/network.js"></script>
    <script src="utils/vad.js"></script>
    <script src="utils/animations.js"></script>
    <script src="utils/live-voice.js"></script>
    <script src="utils/types.js"></script>
    
    <!-- Scripts - Model Maker -->
    <script src="model-maker/model-maker.js"></script>
    <script src="model-maker/index.js"></script>
    <script src="model-maker/css-generator/css-generator.js"></script>
    <script src="model-maker/html-generator/html-generator.js"></script>
    <script src="model-maker/js-generator/js-generator.js"></script>
    <script src="model-maker/cpp-generator/cpp-generator.js"></script>
    
    <!-- Scripts - Main App -->
    <script src="app.js"></script>
    
    <!-- Initialize all modules -->
    <script>
        // This is handled by app.js initializeComponents()
        console.log('[NEXUS] All script modules loaded');
    </script>
</body>
</html>
